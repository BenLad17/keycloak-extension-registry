name: Build & Publish Provider Image

on:
  workflow_dispatch:
    inputs:
      slug:
        description: Extension slug (e.g. keycloak-home-idp-discovery)
        required: true
      version:
        description: Extension version (e.g. v26.1.1)
        required: true
      download_url:
        description: Direct URL to the JAR file
        required: true
      digest:
        description: Expected SHA-256 hex digest of the JAR
        required: true

jobs:
  build:
    name: Build and push provider image
    runs-on: ubuntu-latest

    permissions:
      packages: write

    env:
      IMAGE: ghcr.io/${{ github.repository }}/providers/${{ inputs.slug }}

    steps:
      - name: Download JAR
        env:
          DOWNLOAD_URL: ${{ inputs.download_url }}
        run: |
          curl -fsSL --retry 3 --retry-delay 5 --retry-connrefused "$DOWNLOAD_URL" -o provider.jar

      - name: Verify SHA-256
        env:
          EXPECTED_DIGEST: ${{ inputs.digest }}
        run: |
          echo "${EXPECTED_DIGEST}  provider.jar" | sha256sum -c

      - name: Write Dockerfile
        env:
          SLUG: ${{ inputs.slug }}
        run: |
          printf 'FROM scratch\nCOPY provider.jar /providers/%s.jar\n' "$SLUG" > Dockerfile.provider

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.provider
          push: true
          tags: ${{ env.IMAGE }}:${{ inputs.version }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ inputs.version }}

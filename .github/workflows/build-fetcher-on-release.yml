name: Build & Publish kc-provider-fetcher (Release)

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest

    env:
      IMAGE_NAME: ghcr.io/${{ github.repository }}/ker-provider-fetcher

    steps:
      # Checkout repository
      - name: Checkout code
        uses: actions/checkout@v3

      # Setup Docker Buildx for multi-arch
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Cache Go modules for speed
      - name: Cache Go modules
        uses: actions/cache@v3
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('tools/ker-provider-fetcher/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      # Log in to GitHub Container Registry
      - name: Log in to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Set version and commit
      - name: Set version variables
        run: |
          echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_ENV
          echo "SHA=${GITHUB_SHA::8}" >> $GITHUB_ENV
        shell: bash

      # Build and push Docker image (multi-arch)
      - name: Build and push Docker image
        uses: docker/build-push-action@v3
        with:
          context: ./tools/ker-provider-fetcher
          file: Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ env.VERSION }}
            ${{ env.IMAGE_NAME }}:${{ env.SHA }}
          build-args: |
            VERSION=${{ env.VERSION }}
            COMMIT=${{ env.SHA }}
            DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ env.VERSION }}
            org.opencontainers.image.revision=${{ env.SHA }}

name: Build & Publish Downloader Image

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile.downloader'
      - 'scripts/download-extensions.sh'
  workflow_dispatch:

jobs:
  build:
    name: Build and push downloader image
    runs-on: ubuntu-latest

    permissions:
      packages: write

    steps:
      - name: Compute lowercase image name
        run: echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY@L}/downloader" >> "$GITHUB_ENV"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.downloader
          push: true
          tags: ${{ env.IMAGE }}:latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
